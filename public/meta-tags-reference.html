<!-- 
  ═══════════════════════════════════════════════════════════
  STRICT.DEV - META TAGS COMPLETOS PARA TODOS OS ÍCONES
  ═══════════════════════════════════════════════════════════
  
  Cole estas tags dentro do <head> do teu index.html
-->

<!-- Primary Meta Tags -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Premium web development and AI consultancy in Portugal with NIS2 & GDPR compliance">
<meta name="keywords" content="web development, AI consultancy, NIS2, GDPR, Portugal">
<meta name="author" content="Strict.Dev">
<meta name="theme-color" content="#2f5e50">

<!-- Favicon - Todos os tamanhos -->
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon.png">

<!-- Apple Touch Icons -->
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">

<!-- Web App Manifest -->
<link rel="manifest" href="/site.webmanifest">

<!-- PWA Icons (para Android/Chrome) -->
<link rel="icon" type="image/png" sizes="192x192" href="/web-app-manifest-192x192.png">
<link rel="icon" type="image/png" sizes="512x512" href="/web-app-manifest-512x512.png">

<!-- Open Graph / Facebook -->
<meta property="og:type" content="website">
<meta property="og:url" content="https://strict.dev/">
<meta property="og:title" content="Strict.Dev — Premium Web Development & AI Consultancy">
<meta property="og:description" content="Premium web development and AI consultancy in Portugal with NIS2 & GDPR compliance">
<meta property="og:image" content="https://strict.dev/og-image.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:image:alt" content="Strict.Dev - Premium Web Development">
<meta property="og:locale" content="pt_PT">
<meta property="og:site_name" content="Strict.Dev">

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:url" content="https://strict.dev/">
<meta name="twitter:title" content="Strict.Dev — Premium Web Development & AI Consultancy">
<meta name="twitter:description" content="Premium web development and AI consultancy in Portugal with NIS2 & GDPR compliance">
<meta name="twitter:image" content="https://strict.dev/og-image.png">
<meta name="twitter:image:alt" content="Strict.Dev - Premium Web Development">

<!-- Apple Mobile Web App -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Strict.Dev">

<!-- Microsoft Tiles -->
<meta name="msapplication-TileColor" content="#2f5e50">
<meta name="msapplication-TileImage" content="/web-app-manifest-192x192.png">
<meta name="msapplication-config" content="/browserconfig.xml">

<!-- Canonical URL -->
<link rel="canonical" href="https://strict.dev/">

<!-- DNS Prefetch para performance -->
<link rel="dns-prefetch" href="https://fonts.googleapis.com">
<link rel="dns-prefetch" href="https://fonts.gstatic.com">

<!-- Preconnect para melhor performance -->
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<!-- Robots & Sitemap -->
<link rel="sitemap" type="application/xml" href="/sitemap.xml">

<!-- Security -->
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
